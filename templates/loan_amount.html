
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Amount Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.back-btn{
    color:#60a5fa;
    text-decoration:none;
    font-weight:600;
}

.header{
    margin-top:20px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.header h1{
    color:#60a5fa;
    margin-bottom:10px;
}

.header p{
    color:#cbd5e1;
}

.best-model{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
}

.best-model h3{
    color:#22d3ee;
    margin-bottom:5px;
}

.form-container{
    margin-top:25px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:15px;
}

input,
select{
    width:100%;
    height:55px;
    padding:0 15px;
    border:none;
    border-radius:12px;
    background:#0b1430;
    color:white;
    font-size:15px;
}

input:focus,
select:focus{
    outline:2px solid #22d3ee;
}

.full-width{
    grid-column:1 / span 2;
}

.predict-btn{
    width:100%;
    height:60px;
    border:none;
    border-radius:14px;
    margin-top:20px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.predict-btn:hover{
    opacity:.9;
}

.result-card{
    margin-top:25px;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.result-card h2{
    color:#22d3ee;
    margin-bottom:10px;
}

.result-card p{
    font-size:28px;
    font-weight:bold;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:auto;
    }

}

</style>
</head>
<body>

<div class="container">

<a href="/" class="back-btn">← Back to Home</a>

<div class="header">
    <h1>💰 Loan Amount Prediction</h1>

    <p>
        Predict the expected loan amount using Machine Learning Regression Models
    </p>

    <div class="best-model">
        <h3>⭐ Recommended Model</h3>
        <p>Linear Regression</p>
        <p>R² Score: 0.8514</p>
    </div>
</div>

<div class="form-container">

<form method="POST">

<div class="form-grid">

<div class="form-group">
<label>No. of Dependents</label>
<input type="number" name="dependents" required>
</div>

<div class="form-group">
<label>Education</label>
<select name="education" required>
<option value=" Graduate">Graduate</option>
<option value=" Not Graduate">Not Graduate</option>
</select>
</div>

<div class="form-group">
<label>Self Employed</label>
<select name="self_employed" required>
<option value=" No">No</option>
<option value=" Yes">Yes</option>
</select>
</div>

<div class="form-group">
<label>Income Per Annum</label>
<input type="number" name="income_annum" required>
</div>

<div class="form-group">
<label>Loan Term</label>
<input type="number" name="loan_term" required>
</div>

<div class="form-group">
<label>CIBIL Score</label>
<input type="number" name="cibil_score" required>
</div>

<div class="form-group">
<label>Residential Assets Value</label>
<input type="number" name="residential_assets_value" required>
</div>

<div class="form-group">
<label>Commercial Assets Value</label>
<input type="number" name="commercial_assets_value" required>
</div>

<div class="form-group">
<label>Luxury Assets Value</label>
<input type="number" name="luxury_assets_value" required>
</div>

<div class="form-group">
<label>Bank Asset Value</label>
<input type="number" name="bank_asset_value" required>
</div>

<div class="form-group full-width">
<label>Select Regression Model</label>
<select name="model">
<option value="linear">⭐ Linear Regression (Best)</option>
<option value="decision_tree">Decision Tree Regressor</option>
<option value="random_forest">Random Forest Regressor</option>
</select>
</div>

</div>

<button type="submit" class="predict-btn">
Predict Loan Amount
</button>

</form>

</div>

{% if prediction %}
<div class="result-card">
    <h2>💰 Predicted Loan Amount</h2>
    <p>{{ prediction }}</p>
</div>
{% endif %}

</div>

</body>
</html>

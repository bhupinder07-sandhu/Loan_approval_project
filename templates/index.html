<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            padding:20px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#2c3e50;
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }

        input,select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:12px;
            background:#2c3e50;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#34495e;
        }

        .result{
            margin-top:25px;
            padding:15px;
            background:#ecf0f1;
            border-radius:8px;
        }

        h3{
            color:#27ae60;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🏦 Loan Approval Prediction System</h1>

    <form method="POST">

        <div class="grid">

            <input type="number" name="no_of_dependents" placeholder="No of Dependents" required>

            <select name="education">
                <option value="0">Graduate</option>
                <option value="1">Not Graduate</option>
            </select>

            <select name="self_employed">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <input type="number" name="income_annum" placeholder="Annual Income" required>

            <input type="number" name="loan_term" placeholder="Loan Term" required>

            <input type="number" name="cibil_score" placeholder="CIBIL Score" required>

            <input type="number" name="residential_assets_value" placeholder="Residential Assets Value" required>

            <input type="number" name="commercial_assets_value" placeholder="Commercial Assets Value" required>

            <input type="number" name="luxury_assets_value" placeholder="Luxury Assets Value" required>

            <input type="number" name="bank_asset_value" placeholder="Bank Asset Value" required>

        </div>

        <button type="submit">
            Predict
        </button>

    </form>

    {% if loan_amount_prediction %}
    <div class="result">
        <h3>Predicted Loan Amount:</h3>
        <p>{{ loan_amount_prediction }}</p>

        <h3>Loan Status:</h3>
        <p>{{ loan_status_prediction }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
